<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏄🏻‍♂️청랑 유형 탐구생활🏄🏻‍♂️</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* 과하지 않은 로고 모션(살짝 둥실) */
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .logo-floaty { animation: floaty 2.8s ease-in-out infinite; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-100 to-indigo-200 font-sans p-4">

  <div class="bg-white p-8 rounded-3xl shadow-2xl 
              w-[95%] sm:w-[90%] max-w-lg 
              min-h-[85vh] flex flex-col items-center justify-between 
              text-center border-4 border-blue-300">

    <!-- 로고 영역 -->
    <div class="w-full flex flex-col items-center mb-6">
      <img src="logo.png"
           alt="청랑 로고"
           class="h-20 sm:h-24 object-contain logo-floaty">
      <div class="w-12 h-1 bg-blue-400 rounded-full mt-3"></div>
    </div>

    <!-- 제목 -->
    <div>
      <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-700 mb-2">
        🏄🏻‍♂️청랑 유형 탐구생활🏄🏻‍♂️
      </h1>
      <p class="mb-2 text-gray-600 text-lg">
        청랑 감성으로 알아보는 나의 유형 🌊
      </p>
      <p class="mb-6 text-gray-500 text-sm">
        총 7문항 · 가볍게 시작해요 ✨
      </p>
    </div>

    <!-- 설명 -->
    <p class="mb-8 text-gray-700 text-sm leading-relaxed">
      성균관대학교 대표 학생단체 <span class="font-semibold text-blue-700">청랑</span>과 함께 💙<br>
      딱 7가지 질문으로 내 성향을 확인해보세요<br>
      친구랑 같이 하면 더 재밌어요 🙌
    </p>

    <!-- 시작 버튼 -->
    <button onclick="startTest()"
      class="w-full py-4 bg-blue-600 text-white text-xl font-semibold 
             rounded-xl shadow-md 
             hover:bg-blue-700 hover:scale-105 
             transition transform duration-300">
      테스트 시작하기 🚀
    </button>

    <!-- 푸터 -->
    <p class="mt-6 text-gray-400 text-xs">
      © 청랑 💙
    </p>

  </div>

  <script>
    function startTest() {
      window.location.href = "quiz.html";
    }
  </script>

</body>
</html>
