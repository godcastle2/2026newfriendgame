<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🏄🏻‍♂️청랑 유형 탐구생활🏄🏻‍♂️</title>

  <meta name="theme-color" content="#2563eb" />

  <meta property="og:title" content="🏄🏻‍♂️청랑 유형 탐구생활🏄🏻‍♂️" />
  <meta property="og:description" content="나의 청랑 유형을 확인하고 친구들과 공유하세요." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="preview.png" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* 과하지 않은 로고 모션 */
    @keyframes floaty {
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-6px)}
    }
    .logo-floaty { animation: floaty 2.8s ease-in-out infinite; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-blue-100 to-indigo-200 font-sans p-4">

  <div class="bg-white p-8 rounded-3xl shadow-2xl w-[95%] max-w-xl text-center border-4 border-blue-300">

    <!-- 로고 -->
    <div class="w-full flex flex-col items-center mb-6">
      <img src="logo.png" alt="청랑 로고" class="h-20 sm:h-24 object-contain logo-floaty">
      <div class="w-12 h-1 bg-blue-400 rounded-full mt-3"></div>
    </div>

    <!-- 제목 -->
    <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-700 mb-2">
      🏄🏻‍♂️청랑 유형 탐구생활🏄🏻‍♂️
    </h1>

    <!-- 결과 제목 -->
    <div id="result-text"
         class="text-2xl text-gray-800 font-bold mb-3"></div>

    <!-- 결과 설명 -->
    <div id="result-desc"
         class="text-base text-gray-700 leading-relaxed mb-6 whitespace-pre-line"></div>

    <!-- 결과 이미지 -->
    <img
      id="result-img"
      src=""
      alt="🏄🏻‍♂️청랑 유형 탐구생활🏄🏻‍♂️ 결과 카드"
      loading="eager"
      fetchpriority="high"
      decoding="async"
      class="mx-auto w-72 sm:w-80 rounded-2xl shadow-md border-2 border-blue-200 mb-4"
      style="visibility:hidden"
    />

    <!-- 이미지 설명 -->
    <div id="result-caption"
         class="text-sm text-gray-600 italic mb-6"></div>

    <!-- 버튼 -->
    <div class="space-y-3">
      <button id="retakeBtn"
        class="w-full py-3 bg-blue-600 text-white text-lg font-semibold rounded-xl shadow-md hover:bg-blue-700 hover:scale-105 transition transform duration-300">
        다시 테스트하기 🔁
      </button>

      <button id="shareBtn"
        class="w-full py-3 bg-sky-500 text-white text-lg font-semibold rounded-xl shadow-md hover:bg-sky-600 hover:scale-105 transition transform duration-300">
        결과 공유하기 📤
      </button>

      <button id="copyBtn"
        class="w-full py-3 bg-gray-200 text-gray-800 text-sm font-medium rounded-xl hover:bg-gray-300 transition">
        링크 복사하기 🔗
      </button>
    </div>

    <p id="notice" class="text-xs text-gray-500 mt-4"></p>
  </div>

  <script>
    const RESULTS = {
      giun: {
        dept: "기획운영부",
        text: "📊똑똑이 유생",
        desc:
`당신은 청랑의 브레인🧠
전체 구조를 짜고, 일정을 관리하며, 판을 야무지게 설계하는 타입!
“이거 누가 총괄해?” 하면 자연스럽게 당신 이름이 나오겠군요💚`,
        img: "first.png",
        caption: "판을 설계하고 흐름을 잡는 ‘기획운영부’ 타입 💚"
      },
      ingyeong: {
        dept: "인사경영부",
        text: "⚖️인간 저울 유생",
        desc:
`당신은 청랑의 심장❤️‍🔥
다른 사람을 잘 챙기고 분위기를 살피며,
갈등이 발생하면 체계적이고 공평하게 중재하는 타입!`,
        img: "second.png",
        caption: "팀의 밸런스를 지키는 ‘인사경영부’ 타입 💛"
      },
      daehong: {
        dept: "대외홍보부",
        text: "🪴아이디어 화수분 유생",
        desc:
`당신은 청랑의 얼굴🤴
트렌드 감각이 뛰어나고 아이디어가 끊임없이 나오는 타입!
이미 당신이 방향키를 쥐고 있네요🩵`,
        img: "third.png",
        caption: "반응을 터뜨리는 ‘대외홍보부’ 타입 🩵"
      }
    };

    const DEFAULT_RESULT = {
      dept: "결과 준비중",
      text: "결과 준비중",
      desc: "유효한 결과가 없습니다. 테스트를 다시 진행해주세요.",
      img: "first.png",
      caption: ""
    };

    function getResultKey() {
      const url = new URL(location.href);
      const q = url.searchParams.get("type");
      const fromQuery = q ? q.toLowerCase().trim() : null;
      const fromStorage = localStorage.getItem("resultKey");

      if (fromQuery && RESULTS[fromQuery]) return fromQuery;
      if (fromStorage && RESULTS[fromStorage]) return fromStorage;
      return null;
    }

    // ✅ 결과 1장만 preload + 먼저 로드 완료 후 화면에 표시
    function addPreload(href) {
      const link = document.createElement("link");
      link.rel = "preload";
      link.as = "image";
      link.href = href;
      link.fetchPriority = "high";
      document.head.appendChild(link);
    }

    function preloadAndSetImage(imgEl, src) {
      imgEl.style.visibility = "hidden";

      // 결과 1장만 preload(3장 동시 로드 방지)
      addPreload(src);

      const tmp = new Image();
      tmp.decoding = "async";
      tmp.onload = () => {
        imgEl.src = src;
        imgEl.style.visibility = "visible";
      };
      tmp.onerror = () => {
        imgEl.alt = `이미지 로드 실패: ${src} (파일명/경로 확인)`;
        imgEl.style.visibility = "visible";
      };
      tmp.src = src;
    }

    function render() {
      const key = getResultKey();
      const data = key ? RESULTS[key] : DEFAULT_RESULT;

      document.getElementById("result-text").textContent =
        `${data.text} (${data.dept})`;

      document.getElementById("result-desc").textContent = data.desc;
      document.getElementById("result-caption").textContent = data.caption;

      const imgEl = document.getElementById("result-img");
      preloadAndSetImage(imgEl, data.img);
    }

    document.getElementById("retakeBtn").onclick = () => {
      // 네 파일명이 quiz.html이면 여기 quiz.html로 바꾸면 됨
      location.href = "index.html";
    };

    document.getElementById("shareBtn").onclick = async () => {
      const key = getResultKey();
      const data = key ? RESULTS[key] : DEFAULT_RESULT;
      const shareURL = new URL(location.href);

      try {
        if (navigator.share) {
          await navigator.share({
            title: "🏄🏻‍♂️청랑 유형 탐구생활🏄🏻‍♂️ 테스트 결과",
            text: `내 청랑 유형은 ${data.text} (${data.dept}) 💙`,
            url: shareURL.toString()
          });
        } else {
          alert("웹 공유 미지원 환경입니다. 링크 복사를 사용하세요.");
        }
      } catch {}
    };

    document.getElementById("copyBtn").onclick = async () => {
      const shareURL = new URL(location.href);
      await navigator.clipboard.writeText(shareURL.toString());
      document.getElementById("notice").textContent =
        "링크를 클립보드에 복사했습니다.";
    };

    window.addEventListener("DOMContentLoaded", render);
  </script>

</body>
</html>
